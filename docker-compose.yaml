services:
  # Postgres
  db:
    image: postgres:17
    container_name: meta_crm_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #ports:
    #  - "${POSTGRES_PORT}"
    networks:
      - meta_crm_network
    volumes:
      - meta_crm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
  # Odoo
  odoo:
    image: odoo:19
    container_name: meta_crm_odoo
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: ${ODOO_HOST}
      USER: ${ODOO_USER}
      PASSWORD: ${ODOO_PASSWORD}
    #ports:
    #  - "${ODOO_PORT}"
    networks:
      - meta_crm_network
    volumes:
      - meta_crm_odoo_data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf
    restart: unless-stopped
  # Nginx
  nginx:
    image: nginx:alpine
    container_name: meta_crm_nx
    depends_on:
      - odoo
    ports:
      - "${NGINX_PORT}"
    networks:
      meta_crm_network:
        aliases:
          - crm.metachannelcorp.com
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
# Networks
networks:
  meta_crm_network:
    name: meta_crm_network
# Volumes
volumes:
  meta_crm_db_data:
    name: meta_crm_db_data
  meta_crm_odoo_data:
    name: meta_crm_odoo_data
