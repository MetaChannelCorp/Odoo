services:
  # PostgreSQL
  db:
    image: postgres:18
    container_name: meta_od_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #ports:
    #  - "${POSTGRES_PORT}"
    networks:
      - meta_od_network
    volumes:
      - meta_od_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
  # Odoo
  odoo:
    image: odoo:19
    container_name: meta_od
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: ${ODOO_HOST}
      USER: ${ODOO_USER}
      PASSWORD: ${ODOO_PASSWORD}
    #ports:
    #  - "${ODOO_PORT}"
    networks:
      - meta_od_network
    volumes:
      - meta_od_data:/var/lib/odoo
      - ./odoo/odoo.conf:/etc/odoo/odoo.conf:ro
    restart: unless-stopped
  # Nginx
  nginx:
    #build:
    #  context: ./nginx
    #  dockerfile: Dockerfile
    image: fjrodafo/meta-od-nginx:latest
    container_name: meta_od_nx
    depends_on:
      - odoo
    ports:
      - "${NGINX_PORT}"
    networks:
      meta_od_network:
        aliases:
          - od.metachannelcorp.com
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
# Networks
networks:
  meta_od_network:
    name: meta_od_network
# Volumes
volumes:
  meta_od_db_data:
    name: meta_od_db_data
  meta_od_data:
    name: meta_od_data
